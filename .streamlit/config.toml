# .streamlit/config.toml

[server]
# Вариант 1: Оставить защиту (рекомендуется)
enableXsrfProtection = true
# enableCORS автоматически станет true — это нормально

# Вариант 2: Отключить защиту (только для локальной разработки!)
# enableXsrfProtection = false
# enableCORS = false

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#1976d2"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"